// ================= VOICE OVER =================


function speakCrop(index){


speechSynthesis.cancel();



speech=new SpeechSynthesisUtterance(

crops[index].info

);



if(selectedLanguage=="te"){

speech.lang="te-IN";

}

else if(selectedLanguage=="hi"){

speech.lang="hi-IN";

}

else if(selectedLanguage=="ta"){

speech.lang="ta-IN";

}

else{

speech.lang="en-IN";

}



speech.rate=0.9;


speechSynthesis.speak(speech);


}





function stopVoice(){


speechSynthesis.cancel();


}

// ================= AI RESULT =================


function aiCropResult(){


let soil=document.getElementById("soilType").value;


let water=document.getElementById("water").value;


let season=document.getElementById("season").value;



let crop="Rice 🌾";


let reason="Suitable crop based on farming details.";




if(soil=="Black Soil"){


crop="Cotton 🌿";


reason="Black soil is suitable for cotton cultivation.";

}

else if(soil=="Sandy Soil"){


crop="Groundnut 🥜";


reason="Sandy soil is suitable for groundnut cultivation.";

}

else if(water=="Low"){


crop="Millets 🌾";


reason="Millets require less water.";

}

else if(season=="Rabi"){


crop="Wheat 🌾";


reason="Wheat is suitable for Rabi season.";

}





document.getElementById("content").innerHTML=`


<div class="card">


<h2>
🤖 AI Recommendation Result

${crop}

</h1>



<p>

${reason}

</p>



<button onclick="recommend()">

⬅ Back

</button>



</div>


`;

}

// ================= AI SEARCH ASSISTANT =================


function cropAIAnswer(){


let question=document
.getElementById("cropQuestion")
.value
.toLowerCase();



let answer="";



if(question.includes("rice") || question.includes("paddy")){


answer="Rice cultivation requires quality seeds, suitable soil, proper irrigation, fertilizer management, weed control and pest protection.";

}

else if(question.includes("wheat")){


answer="Wheat requires cool climate, fertile soil, correct sowing time, irrigation and balanced nutrients.";

}

else if(question.includes("cotton")){


answer="Cotton grows well in black soil. Use certified seeds and manage pests properly.";

}

else if(question.includes("fertilizer") || question.includes("nutrient")){


answer="Use soil testing before fertilizer application and apply nutrients according to crop requirements.";

}

else if(question.includes("pest") || question.includes("insect")){


answer="Identify pests correctly and follow integrated pest management methods.";

}

else if(question.includes("soil")){


answer="Soil testing helps select suitable crops and understand nutrient conditions.";

}

else if(question.includes("water") || question.includes("irrigation")){


answer="Provide irrigation according to crop stage, soil type and weather conditions.";

}

else{


answer="Ask questions about crops, soil, fertilizer, pests, irrigation and cultivation methods.";

}




document.getElementById("cropAnswer").innerHTML=`


<div class="card">


<h3>
🤖 AI Answer
</h3>


<p>

${answer}

</p>


</div>


`;

}

let file=new Blob(

[website],

{
type:"text/html"
}

);



let url=URL.createObjectURL(file);



let link=document.createElement("a");



link.href=url;



link.download="Agricultural_Food_Technology_Rural_Development.html";



link.click();

}
